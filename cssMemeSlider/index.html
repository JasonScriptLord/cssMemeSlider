<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Css meme slider</title>
</head>
<body>
    <div class="container">
        
        <input class="radio" type="radio" name="slider" id="radio1" value="1" checked>
            <input class="radio" type="radio" name="slider" id="radio2" value="2">
            <input class="radio" type="radio" name="slider" id="radio3" value="3">
            <input class="radio" type="radio" name="slider" id="radio4" value="4">
                    <div class="close"></div>

        <div class="container-slider">
            <div class="slide1 slide-block">
                <img class="slide-img slide-block" src="images/1.jpg" alt="">
            </div>
            <div class="slide2 slide-block">
                <img class="slide-img" src="images/2.jpg" alt="">
            </div>
            <div class="slide3">
                <img class="slide-img slide-block" src="images/3.jpg" alt="">
            </div>
            <div class="slide4">
                <img class="slide-img slide-block" src="images/4.jpg" alt="">
            </div>
        </div>
        <div class="text-container">
            <p class="slide-text1">I'm best of the best!</p>
            <p class="slide-text2">I'm best of the best of the best!</p>
            <p class="slide-text3">Keep going... I believe in you!</p>
            <p class="slide-text4">Don't stop!</p>
        </div>
        <div class="label-container">
            <label class="label" for="radio1">
                <span class="label-phone1"></span>
            </label>
            <label class="label" for="radio2">
                <span class="label-phone2"></span>
            </label>
            <label class="label" for="radio3">
                <span class="label-phone3"></span>
            </label>
            <label class="label" for="radio4">
                <span class="label-phone4"></span>
            </label>
        </div>

    </div>
</body>
</html>
