<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Css meme slider</title>
</head>
<body>
    <div class="container">
        <div class="pagination">
                <input class="radio" type="radio" name="slider" id="radio1" value="1">
                <label class="label" for="radio1">
                    <span class="label-phone1"></span>
                </label>
                <input class="radio" type="radio" name="slider" id="radio2" value="2">
                <label class="label" for="radio2">
                    <span class="label-phone2"></span>
                </label>
                <input class="radio" type="radio" name="slider" id="radio3" value="3">
                <label class="label" for="radio3">
                    <span class="label-phone3"></span>
                </label>
                <input class="radio" type="radio" name="slider" id="radio4" value="4">
                <label class="label" for="radio4">
                    <span class="label-phone4"></span>
                </label>
        </div>
        <ul class="container-slider">
            <li class="slide">
                <img src="images/1.jpg" alt="">
                <p>Слайд 1</p>
            </li>
            <li class="slide">
                <img src="images/2.jpg" alt="">
                <p>Слайд 2</p>
            </li>
            <li class="slide">
                <img src="images/3.jpg" alt="">
                <p>Слайд 3</p>
            </li>
            <li class="slide">
                <img src="images/4.jpg" alt="">
                <p>Слайд 4</p>
            </li>
        </ul>
    </div>
</body>
</html>
